<!DOCTYPE html>
    <html>
    <title>User Information Form</title>
    <head>

            </head>
        <body>
        <form action="" method="post">
            
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="firstname" required><br><br>

            <label for="lname">Middle Name:</label><br>
            <input type="text" id="Mname" name="Middle Name" required><br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lastname" required><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age" required><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label><br><br>

            <label>Hobbies</label><br>
            <input type="checkbox" id="hobby1" name="hobby" value="Gaming">
            <label for="hobby1">Gaming</label><br>
            <input type="checkbox" id="hobby2" name="hobby" value="Biking">
            <label for="hobby2">Biking</label><br>
            <input type="checkbox" id="hobby3" name="hobby" value="Cooking">
            <label for="hobby3">Cooking</label><br>
            <input type="checkbox" id="hobby4" name="hobby" value="Reading">
            <label for="hobby4">Reading</label><br>
            <input type="checkbox" id="hobby5" name="hobby" value="Swimming">
            <label for="hobby5">Swimming</label><br><br>


            <label for="year-level">Year Level:</label><br>
            <select id="year-level" name="year_level">
                <option value="1st-year">1st year</option>
                <option value="2nd-year">2st year</option>
                <option value="3rd-year">3st year</option>
                <option value="4th-year">4st year</option>

            </select><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>

        </form>
        </body>
            </html>
