<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 11</title>
    <!-- Connect your CSS here -->
    <link rel="stylesheet" href="style11.css">
    <!-- Connect your JavaScript here -->
    <script src="functionLoop.js"></script>
</head>
<body>

    <div class="container">
        
       
        <div class="card">
            <h3>For Loop</h3>
            <form>
                <div class="input-group">
                    <label>Enter number :</label>
                    <input type="text" id="num1">
                </div>
                <div class="input-group">
                    <label>Enter text :</label>
                    <input type="text" id="text1">
                </div>
                <button type="button" class="btn" onclick="runForLoop()">Show</button>
                <button type="button" class="btn" onclick="clearFor()">Clear</button>
            </form>
            <div id="output1" class="output"></div>
        </div>

     
        <div class="card">
            <h3>While Loop</h3>
            <form>
                <div class="input-group">
                    <label>Enter number :</label>
                    <input type="text" id="num2">
                </div>
                <div class="input-group">
                    <label>Enter text :</label>
                    <input type="text" id="text2">
                </div>
                <button type="button" class="btn" onclick="runWhileLoop()">Show</button>
                <button type="button" class="btn" onclick="clearWhile()">Clear</button>
            </form>
            <div id="output2" class="output"></div>
        </div>

        
        <div class="card">
            <h3>Do-While Loop</h3>
            <form>
                <div class="input-group">
                    <label>Enter number :</label>
                    <input type="text" id="num3">
                </div>
                <div class="input-group">
                    <label>Enter text :</label>
                    <input type="text" id="text3">
                </div>
                <button type="button" class="btn" onclick="runDoWhileLoop()">Show</button>
                <button type="button" class="btn" onclick="clearDo()">Clear</button>
            </form>
            <div id="output3" class="output"></div>
        </div>

    </div>

</body>
</html>
